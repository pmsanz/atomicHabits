kind = "web"
previewPath = "/"
title = "Atomic Identity Habits"
version = "1.0.0"
id = "artifacts/atomic-habits"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23634

[services.development]
run = "pnpm --filter @workspace/atomic-habits run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atomic-habits", "run", "build" ]
publicDir = "artifacts/atomic-habits/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23634"
BASE_PATH = "/"
