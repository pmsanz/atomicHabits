server {
    listen 80;
    server_name _;

    # Gzip for faster asset delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/woff font/woff2;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static assets: cache aggressively (Vite adds content hashes) ──────────
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API: reverse proxy to the Express container ───────────────────────────
    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Increase timeouts for long-running AI chat requests
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── SPA fallback: all other paths serve index.html ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
